            - heading "James Bond 007 (60th LE)" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: James Bond 007 60th Anniversary Limited Edition pinball machine highlights the entire franchise of 25 films, all James Bond actors, villains, and henchmen.
              - text: Stern Pinball’s James Bond 007 60th Anniversary Limited Edition pinball machines will immerse players in the history of 007. Limited to 500 machines globally, the rare 60th Anniversary Limited Edition offers players a one-of-a-kind pinball experience. Control the chaos from Oddjob’s kinetic spinning disc hat as you battle villains and utilize special gadgets. Survive tactical precision shots against 10 drop targets as you start Mission Multiball mayhem. Escape SPECTRE’s evil henchmen as you navigate pinballs through 4 fast-flowing optical spinners. Like a hidden gadget from Q Branch, learn your assignments through a custom LCD screen located inside the playfield and watch your high scores rack up on the unique classic-style mechanical score reels.
              - text: The James Bond 007 60th Anniversary Limited Edition includes the official James Bond 007 pinball topper, an exclusive full-color mirrored backglass inspired by 60 years of James Bond, custom high gloss and powder-coated pinball armor, a custom designer-autographed bottom arch, an exclusive Union Jack pinball shooter knob, upgraded audio system, anti-reflection pinball playfield glass, shaker motor, a sequentially numbered plaque, and a Certificate of Authenticity signed by Stern Chairman Gary Stern and President & CEO Seth Davis.
              - text: “For the ultimate James Bond fan, we wanted to celebrate 60 years of this beloved film franchise in style. Partnering with EON Productions/Danjaq, MGM Studios and Aston Martin, we created a timeless pinball experience.” said Gary Stern, Chairman.
