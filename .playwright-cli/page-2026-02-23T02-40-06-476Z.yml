            - heading "Bally" [level=2] [ref=e127]
            - heading "Freedom EM" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: Bally's Freedom was released in three different versions. This is the original first design, often referred to as the "Freedom Prototype". It features a middle-pop layout (pop bumper between the flippers) and is believed to have been manufactured only in small quantities of perhaps 100 in total.
              - text: According to the Encyclopedia of Pinball Volume 1, after showcasing it to the European market, the layout was changed early in the production process due to negative reactions from distributors.
              - text: The subsequent "2nd version" (5080 produced) and solid-state versions (1500 produced) of Freedom removed the middle-pop bumper. Instead, a traditional "Italian bottom" (outlanes and inlanes for each flipper) was installed which is the most common layout to this day.
              - text: Nearly every middle-pop game from 1966 onward is exclusively the work of Norm Clark, and this type of layout was his personal favorite signature design.
              - text: Prior to Freedom, Mr. Clark had just been hired as the head of the Bally design department. Thus, the Freedom Prototype is the only non-Williams middle-pop EM that has ever reached production.
              - text: Development started in October 1975 and the first sample machines were produced early in 1976. Freedom was also the first commercial solid-state game Bally successfully produced in quantity.
