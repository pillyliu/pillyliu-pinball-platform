            - heading "Flash Gordon" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: Flash Gordon is a pinball machine from February 1981, manufactured by Bally Manufacturing Co. It was the first split-level pinball machine from Bally, as well as the first game to use the "Squawk and Talk" sound board. It was also the second production Bally game with speech.
              - text: Serial number 1001 through 1010 where factory samples. Serial numbers up to about 1300 (the Pilot run) were outfitted with the Sounds Plus/Vocalizer sound board pair because the S&T was not in available yet. The production run of Flash Gordon machines began after serial number 1300 and used the Squawk and Talk sound board.
