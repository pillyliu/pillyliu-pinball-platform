          - generic [ref=e123]:
            - link [ref=e125] [cursor=pointer]:
              - /url: /pinball/machine/stern
              - img [ref=e126]
            - heading "Stern" [level=2] [ref=e127]
            - heading "Teenage Mutant Ninja Turtles (LE)" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: Leonardo, Donatello, Raphael and Michelangelo are the Teenage Mutant Ninja Turtles, trained in the art of ninjutsu by their wise rat sensei, Master Splinter. Is New York City ready for these radical reptile brothers? With a sick sewer lair and tough friends like April O’Neil and Casey Jones, the Turtles are about to face evils more dangerous and pizza more delicious than anything they could have ever imagined. In this pinball adventure players will go to battle as the Turtles fight villains like Shredder, the Krang and loads of super-powerful mutants, to become the heroes they were destined to be, and have loads of fun along the way!
              - text: “Teenage Mutant Ninja Turtles began as a comic book, morphed into a hit animated show, and has grown into a beloved and iconic global pop culture phenomenon. We have worked directly with Nickelodeon to bring these heroes in a half-shell into the pinball dimension. This game has pure pinball power,” said Gary Stern, Chairman and CEO of Stern Pinball, Inc.
              - text: The Premium and Limited Edition models feature an interactive custom sculpted Turtles Van, equipped to lock up to 4 balls inside with a mechanical opening/closing side door, ready to unleash multiball havoc upon players. These models also feature the iconic TMNT Glider, a custom-sculpted, player-controlled diverter assembly stationed above both ramps, giving players the ability to control and transport the ball to the flipper of their choice. In addition, a custom-sculpted mechanical Krang toy hovers over the pop bumpers, jumping up and down while taunting players throughout game action.
              - text: The Pro, Premium, and Limited Edition models all feature distinct hand-drawn art in addition to a high speed magnetic spinning pizza disc capable of holding and throwing 3 balls during pizza multiball mayhem. The original 1987 theme music complements the action with custom video scenes and events created exclusively for this pinball experience. All models include 3 flippers, 3 high speed ramps, and a hidden ninja training ball lock area.
              - text: The LE model is limited to 500 units globally. The LE model includes additional unique features such as an exclusive mirrored backglass, exclusive custom themed cabinet artwork, a custom autographed bottom arch, exclusive custom art blades, upgraded audio system, anti-reflection pinball glass, a shaker motor, and a sequentially numbered plaque.
