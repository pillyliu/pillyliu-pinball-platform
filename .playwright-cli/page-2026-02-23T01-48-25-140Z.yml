            - heading "Multimorphic" [level=2] [ref=e124]
            - heading "Portal" [level=1] [ref=e125]
            - generic [ref=e126]:
              - text: Portal (pinball game) is an officially licensed pinball adaptation of Valve Corporation's Portal video game franchise, developed by Multimorphic for their P3 pinball platform.
              - text: Released in 2025, it features a "portable testing unit" theme that immerses players in the Portal universe through specialized playfield mechanics, distinctive artwork, and integrated software.
              - text: "The game incorporates more physical pinball mechanisms than any previous P3 title while maintaining the franchise's aesthetic and gameplay elements. It is available in two configurations: Portal Standard ($3,900 standalone/$11,620 with P3 system) includes an advanced upper playfield module, while Portal Extended ($5,500 standalone/$12,500 with P3 system) adds further interactive shots and mechanisms in the lower playfield area via a drop-in module extension."
              - text: The game software automatically detects which version is installed and adjusts gameplay rules accordingly. Both versions integrate digital displays with physical pinball elements to create a hybrid gaming experience consistent with the Portal franchise's technological themes.
              - text: Developed by Multimorphic in collaboration with Valve Corporation, the game translates Portal's unique gameplay concepts into pinball form, emphasizing the integration of the P3's digital capabilities with traditional pinball mechanics.
