            - heading "Stern" [level=2] [ref=e127]
            - 'heading "Avengers: Infinity Quest (pro)" [level=1] [ref=e128]'
            - generic [ref=e129]:
              - text: For over 50 years the Avengers have delighted fans through comic books, television series and movies. In this pinball adventure, players will transform into their favorite Super Heroes as they battle Thanos and his minions across the cosmos. On his unrelenting quest for intergalactic omnipotent power, it’s a race to hunt down and recover the six Infinity Gems before Thanos gets his hands on them. It’s up to the player to stop Thanos and the Black Order from succeeding in this action-packed pinball experience.
              - text: "“Like the Avengers, our team of designers, programmers, artists, and engineers have assembled to bring this universe to life in pinball form through incredible artwork, design, visuals, and sounds. This comic book universe has remained a staple in pop culture since first appearing in 1963. Through Avengers: Infinity Quest pinball machines, that tradition will carry on for current and future generations of fans,” said Gary Stern, Chairman and CEO of Stern Pinball, Inc."
              - text: The Pro, Premium, and Limited Edition models all feature an interactive Dr. Strange spinning kinetic sling ring disc with dual direction velocity detection, aiding players on their journey to opening portals and starting Infinity Gem quests. All models feature a gravity defying Avengers Tower magnetic lock ramp with gravitational vari-target and magnet hold, capturing pinballs in midair as players unlock Iron Man Multiball. In addition to distinct hand-drawn artwork, all models feature an Avengers Computer Bingo grid 3-target drop bank, a Thor captive ball, Hulk spinning target, custom intricate wireform ramps, and 3 full size flippers.
              - text: The Premium and Limited Edition models feature an interactive Dr. Strange motorized pop-up disc scoop, transporting pinballs into an underground Portal, a visible subway capable of holding and staging up to 3 balls through custom playfield windows accentuated with dynamic RGB lighting effects. These models also include a custom sculpted Thanos Infinity Gauntlet integrated with atmospheric light-up gems, a Captain Marvel inverse gravity custom wireform ramp, and a Pym Laboratories vertical up-kicker.
              - text: The LE model is limited to 500 units globally. This limited version includes additional unique features such as an exclusive mirrored backglass, exclusive custom themed cabinet artwork, a custom autographed bottom arch, exclusive custom art blades, upgraded audio system, anti-reflection pinball glass, a shaker motor, and a sequentially numbered plaque.
