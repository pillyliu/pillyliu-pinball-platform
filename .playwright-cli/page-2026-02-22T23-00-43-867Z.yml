            - heading "Gottlieb" [level=2] [ref=e127]
            - heading "Gladiators" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: The player is an armor-clad warrior in a featureless abstract cyberscape, where the goal is to survive the six rounds of the Battle Pyramid. Drop off the swinging Catapult crane into the pit, bring down the Rain of Terror, slingshot around the upper playfield ramp, and build up the Cataclysm bonus. Synchronize the left and right sides for Attack Mode, advance the WEAPON and DOUBLE powers for greater scores, then spell M-U-L-T-I to start a two-ball multiball. If you can survive the Pyramid, proceed to the Beast Challenge and behead the three-headed monster, and become recognized as a Beast Slayer.
              - text: Originally intended to be a pinball based on The Legend of Zelda, to be released after the Super Mario Bros. and Super Mario Bros. Mushroom World tables. Midway through development, Gottlieb had an agreement for the American Gladiators license on the condition that they have a game released quickly. This pin was rethemed and reprogrammed to match, but the deal fell through; without time to revert the game to Zelda, it was decided to release it as Gladiators
