            - heading "Williams" [level=2] [ref=e127]
            - heading "Pinbot" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: Pin•Bot was made between October 1986 and February 1987 and sold 12,001 units. Created by Barry Oursler, and Python Anghelo, along with Bill Pfutzenreuter, Chris Granner, Bill Parod, and Joe Joos Jr.
              - text: This was the first machine ever that had the entire development team credited on the game (and all were paid sales commissions), at Python Anghelo’s insistence.
              - text: Flippers (2), Pop bumpers (3), 5-target dropping bank (1), 3-bank drop targets (1), Kick-out holes (3). Opening skill shot sends ball up a conical ramp. Colorful playfield array of lights track progress of hitting targets. A dropping bank of 5 standup targets lowers to reveal two kick-out holes. Upper level bagatelle mini-playfield. 2-ball multiball.
              - text: The game uses the Williams System 11A MPU and features a flashing light topper bar.
              - text: The voice of Pin•Bot is performed by Barry Oursler.
