              - text: The Party Zone (Bally) 1991 Midway Manufacturing Co. Illinois USA
              - text: "\"You are about to enter another dimension, with your Host, Pilot and DJ - Captain B.Zarr. Fasten your seatbelts and escape to a parrallel Universe, that's way beyond Wisconsin! Meet &amp;amp; greet pinballs greatest partiers at the most electro-flying club ... 'The Cosmic Cottage' where they really pump-it-up! During 'Happy Hour' fill up with 'Rock-It' Fuel, Blast Off, and 'Rock-It' through the 'O-Zone' for some major scoring. You may even experience the 'Big Bang'! (It's not just a theory anymore!) So become a frequent flyer on a fantasy excursion that will take you way, way, way out there to ... The Party Zone!\""
              - text: A celebration of Bally's 'party-theme' pinball machines.
              - text: When the characters meet at the Cosmic Cottage, player is rewarded with multi-ball.
              - text: Captain B. Zarr talks and moves to follow the ball, and lets the player know when targets are lit like Extra-ball, Multi-ball, Robotic Comic, Big Bang jackpot, etc.
              - text: Dot-matrix display show scores and animations for the games duration.
              - text: Music can be requested during the game. Scoring the Big-Bang Jackpot will alter the playfield lighting and the music changes to Jimi Hendrix - Purple Haze!
