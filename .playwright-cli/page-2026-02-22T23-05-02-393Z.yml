            - generic [ref=e129]:
              - text: An original pinball experience celebrating the iconic American TV hit sitcom, The Munsters. Players will be transported to 1313 Mockingbird Lane, joining the entire Munsters family on this haunted pinball adventure. Featuring Herman, Raven, Lily, Spot and Grandpa, players will work their way towards Munster Madness in this frightfully funny and action-packed pinball world under glass. The Munsters pinball machines will be available in Pro, Premium, and Limited Edition models.
              - text: Stern’s The Munsters Pro, Premium, and Limited Edition models feature stunning and distinctive hand-drawn art. Each game features a custom sculpted Herman bash toy with magnetized ball catch, highlighting Herman multiball. In addition, all models include a pop-up Spot bash toy hidden under the left ramp, a custom sculpted Drag-U-La toy car featured near a left shooter lane kicker, as well as a metal turn-around, flip-up ramp.
