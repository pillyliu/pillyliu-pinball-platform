            - heading "Stern" [level=2] [ref=e127]
            - heading "Avatar (LE)" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: "The Limited Edition of Avatar model has a number of enhancements over the regular version:"
              - text: The amp suit model which just falls down and lifts back up in the Pro model, has animated legs which march up and down.
              - text: The transporter pod we said should have been motorised gets the motor it needs to enable the lid to open and close.
              - text: A shaker motor is included in the game.
              - text: There are more models of the characters including a banshee over the ramp, Colonel Quaritch in his amp suit - another feature we said should have been included - and Na'vi people over the N-A-V-I targets.
              - text: We noted the number of unused lamps on the lamp matrix. Well, these have been used to add more controlled lighting which sits alongside more general illumination lamps.
              - text: There's a return to a metal bottom arch which has backlighting for new translucent blue windows.
              - text: Metal playfield slide rails are also fitted in place of the pegs used on newer models.
              - text: The original-style lock bar and latch mechanism make a comeback.
              - text: A white powerball in included in place of one of the steel balls, along with a sensor which increases scoring when the special ball is in play.
              - text: New game rules and software is added to operate the new playfield devices and features.
              - text: Chrome side rails, lock bar and hinges are installed.
              - text: In addition, playfields for machines 1-25 will be signed, while all Limited Edition playfields will have an additional hard coat applied. All 250 will also be individually numbered and include a special plaque and certificate of authenticity.
