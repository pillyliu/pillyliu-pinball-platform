            - generic [ref=e129]:
              - text: Gottlieb "Monte Carlo" (1987)
              - text: A game that does have a gambling theme (in fact it's even located in one of Europe's finest casino sites) is Gottlieb's 1987 "Monte Carlo". Pure roulette beauty... in a pinball machine!
              - text: This four player game featured the great "10,000,000 Point Shot", a three ball multiball and ... a real roulette wheel! The wheel, numbered 0, 1, 2, 3, 4, 5, 00, 6, 7, 8, 9 and 10 is a bit smaller than the real deal have had only one green area (00 is a Vegas thing) but it spins and it rattles and it's cool! The backglass also breathes roulette in every way, with some prominent very rich snobs and a red and green feel to it.
              - text: We give this machine a "Roulette in Pinball" score of 9 out of 10 points!
