            - heading "Bally" [level=2] [ref=e127]
            - heading "Twilight Zone" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: Twilight Zone is a wide-body Pinball Machine manufactured by Bally released in April, 1993.
              - text: It is themed after the television series that was created by Rod Serling and which aired on American television from 1959-1964 originally. The game is often noted to be the game with the most patents (however Pinball Magic by Capcom has more), the most toys and the most over-cost budget in the history of pinball.
              - text: Main features include four flippers, a life-size gumball machine that locks balls inside, a mechanical clock with rotating arms, a mini playfield with invisible (magnet) flippers and a ceramic ball that is not affected by the game's two stock magnets.
              - text: Twilight Zone is one of the most popular machines amongst home owners and many modifications (mods) are sold for it, including a robot toy, a real mini television screen, a flashing camera and more!
