            - heading "Stern" [level=2] [ref=e127]
            - heading "Heavy Metal" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: The Heavy Metal pinball machine commemorates the 300th issue of Heavy Metal, which has been running since 1977 and inspired the 1981 animated movie of the same name. An exclusive variant cover edition of issue 300 will be included with every machine. Heavy Metal is working with Incendium as a premier licensing partner to align with premium brands and their products.
              - text: “Sci-fi, fantasy, horror, and metal collide in this first-ever pinball machine. This is our most ambitious Heavy Metal product yet. We couldn’t be more proud of the result and we’re hugely grateful for the support from Stern Pinball and Heavy Metal in bringing this amazing machine into existence,” said Llexi Leon, CEO of Incendium.
              - text: “Gamifying The Heavy Metal ethos into this timeless machine is a testament to Incendium’s understanding of Heavy Metal’s vision. I couldn’t be more excited about this product, and all of the other speciality items we have on our upcoming slate.” added Matthew Medney, CEO of Heavy Metal.
              - text: The original art created for the Heavy Metal pinball machine art pays tribute to characters and worlds from the magazine’s storied history. New additions from its upcoming publications join this shared universe for the first time. Gameplay revolves around the warrior heroine, Taarna and the undead tailgunner, Nelson. Both, will speak for the first time ever, supporting the in-game narrative.
              - text: The pinball machine soundtrack will feature original recordings from Sebastian Bach, and Brendon Small, in addition to iconic tracks from the Heavy Metal movie original soundtrack including Blue Oyster Cult, Cheap Trick, and more.
              - text: "This limited edition pinball machine is built to order and only available this year, 2020. The Heavy Metal pinball machine features cabinet armor in the unique color changing galaxy black metallic with all original art, figures of Taarna and Nelson that light up, custom art blades and a limited edition, hand numbered issue of Heavy Metal #300 with a variant cover."
              - text: "Correction update: Only 100 Stern Heavy Metal Pinball Machines of the 300 scheduled to be produced were ever made. No matching numbered magazine issues were ever issued, Incendium was shipped the blank cover variant of issue 300 and decided not to use them."
              - text: "Song list:"
              - text: "1: Veteran Of The Psychic Wars – Blue Oyster Cult"
              - text: "2: Takin A Ride (Heavy Metal) – Soundswitch"
              - text: "3: World Of Fantasy – Helloween"
              - text: "4: Cosmic Power Of The Infinite Shred Machine – Dragonforce"
              - text: "5: Heavy Metal – Justice"
              - text: "6: Midnight Flyer – The Night Flight Orchestra"
              - text: "7: I Must Be Dreamin’ – Cheap Trick"
              - text: "8: Heavy Metal – Sebastian Bach feat. Brendon Small"
              - text: "9: At The Edge Of Time – Blind Guardian"
              - text: "10: Space Police – Edguy"
              - text: "11: Sky Is Mine – Amorphis"
              - text: "12: Lightyears from Home – Primal Fear"
