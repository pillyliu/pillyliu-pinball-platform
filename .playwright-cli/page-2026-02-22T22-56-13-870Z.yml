            - heading "Williams" [level=2] [ref=e127]
            - heading "Firepower" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: "Firepower was released in February of 1980 and designed by Steve Ritchie. Firepower is the second pinball to feature speech (the first being \"Gorgar\"). The eleven word ability was beyond Gorgar's seven word memory. Firepower has three notable \"firsts\":"
              - text: 1) the first pinball with the "lane change" feature in which the right flipper button controlled the lit/unlit status of rollover lanes;
              - text: 2) the first SS pinball to have a multiball feature. Attaining three balls in play at the same time was an uniquely attractive reward;
              - text: 3) the first playfield animation. This "countdown to multiball" animation was innovative and amazing in 1980. It was also near the limit of the electronic and computational capacity of the hardware.
              - text: "It ranks at #5 in the list of the most successful Flippergames of all time, with 17,410 units."
              - text: According to Steve Ritchie the first 10 Machines had 6 Drop-Targets but since the Drop-Target-Bank-Design at the Time was too unreliable and would have caused too much Maintenance-Trouble they went with Stand-Up-Targets instead.
              - text: In 1982 Williams fabricated an unknown Number of Replacement-Stock-Playboards for FIREPOWER with slightly different Starburst-Inserts and different Color for the huge lower Spaceship.
