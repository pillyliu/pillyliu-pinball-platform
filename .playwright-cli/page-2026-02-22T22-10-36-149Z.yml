            - heading "The Mandalorian (Premium)" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: The story of The Mandalorian is set after the fall of the Galactic Empire and before the emergence of the First Order. The series follows the travails of a lone gunfighter in the outer reaches of the galaxy, far from the authority of the New Republic.
              - text: In this action-packed pinball quest, players are transported to a galaxy far, far away as they play as the Mandalorian, teaming up with key allies and protecting Grogu, while battling dangerous enemies and forces across their journey.
              - text: “Star Wars is timeless and our players have enjoyed every pinball machine reimagined by the iconic space saga,” said Gary Stern, Chairman and CEO of Stern Pinball, Inc. “Stern’s new pinball machine, inspired by The Mandalorian, continues that tradition with an engaging and exciting story for an entirely new generation of fans around the world. Collaborating with Lucasfilm, we have brought all of the suspense, excitement, and action from the Star Wars galaxy into a one-of-a-kind pinball adventure perfect for any location or home gameroom.”
              - text: Prepare for battle on the gravity-changing, rotating Encounter upper mini playfield available on the Premium and Limited Edition models. This innovative, motorized rotating playfield is packed with six stand-up targets, lights, and two full-size flippers for high intensity pinball action.
