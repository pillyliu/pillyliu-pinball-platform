            - heading "Pinball Brothers" [level=2] [ref=e124]
            - heading "Alien (Ellen Ripley Version)" [level=1] [ref=e125]
            - generic [ref=e126]:
              - text: A new version of the 2021 released "Alien" by Pinball Brothers.
              - text: This new Alien version will include new art pieces from The Art of Pinball.
              - text: Sculpted- & hand-painted LCD frame for the mini-display
              - text: Newly designed Apron decal with a special metal effect
              - text: Hand-painted Xeno head
              - text: The whole game will feature new artwork both on the outside as well as the inside. There is a new Loader Battle inspired translite and a multi-faceted atmosphere on the entire cabinet with assets from both Alien and Aliens. The interior is partly new as well with new art for the entire inside of the cabinet.
              - text: Pinball Brothers also introduce a whole range of add-ons for all Alien games from Pinball Brothers (SV/LV and the new Ellen Ripley Version). Among the first add-ons released there will be a brand new Mini-beacons and flasher kit, Beacon-kit (for backbox) & a Shaker-kit. SV/LV owners will also be able to equip their games with the all the new sculpted art from The Art of Pinball that is included in the Ellen Ripley Version.
              - text: There will also be an interactive topper made available for all Alien owners.
