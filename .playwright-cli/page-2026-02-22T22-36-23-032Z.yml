            - generic [ref=e129]: Indianapolis 500 is a pinball machine produced by Bally and released in June, 1995. Indianapolis 500 features a deep ruleset that revolves around advancing through the race by completing the Speedway; advancing your Position; making the Lite-Ups; and going through as many Laps as possible to go for a Victory Lap. While the machine has a low run, it is admired by enthusiasts today for its blending of theme with a large amount of unique toys and features. ABC-TV's Paul Page and Bobby Unser provide voice call-outs in a play-by-play style narration, similar to World Cup Soccer.
