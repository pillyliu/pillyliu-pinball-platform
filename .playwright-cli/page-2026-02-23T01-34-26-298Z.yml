            - heading "Williams" [level=2] [ref=e127]
            - heading "Demolition Man" [level=1] [ref=e128]
            - generic [ref=e129]:
              - text: Demolition Man is a Williams pinball machine released in February 1994 and designed by game designer Dennis Nordman. The game is based on the motion picture of the same name. It is part of WMS' SuperPin line of widebody games.
              - text: Gameplay is centered around 4 multiballs, named Fortress Multiball, Museum Multiball, Wasteland Multiball, and Cryoprison Multiball. Completing all multiballs lights the Demolition Jackpot (the total of all jackpots scored in all mutiballs).
              - text: "The main playfield toy is the Cryo Claw, a mechanical device that captures the ball from a right ramp shot (via a magnet) and is then user-controlled to drop the ball onto one of 5 possible awards: Start AcMag, Lock Freeze, Prison Break, Super Jets and Capture Simon. Completing the 5 awards lights \"Demolition Time\" a wizard mode starting at 3 balls and with a maximum of 5 balls multiball."
              - text: Demolition Man runs on Williams' WPC system with DCS sound. Custom speech was recorded by actors Sylvester Stallone and Wesley Snipes under direction of the game's sound designer Jon Hey.
              - text: Demolition Man had a production run of 7019 games.
