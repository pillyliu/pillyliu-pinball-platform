            - heading "Barrels of Fun" [level=2] [ref=e124]
            - heading "Labyrinth" [level=1] [ref=e125]
            - generic [ref=e126]:
              - text: Venture into the fantasy world by visionary Jim Henson’s, Labyrinth. This cult classic from the 80s, featuring the iconic David Bowie as Jareth the Goblin King, who has captured the imaginations of many.
              - text: Embark on this pinball adventure, as you encounter a cast of characters, including Hoggle, Sir Didymus, and Ludo, who can become your loyal companions “Should you need them” and prove invaluable allies as you navigate the labyrinth filled with outrageous creatures and unknown dangers.
              - text: Your ultimate goal is to reach the castle beyond the Goblin City, where Jareth awaits. You’ll face numerous challenges and obstacles. These challenges will involve solving riddles, and the ever-shifting paths of the labyrinth, and outsmarting cunning adversaries. Each successful conquest will earn you an Orb, which is essential for progressing deeper into the labyrinth.
              - text: The journey through the Labyrinth is not only a test of wit and courage but is your own adventure. A world where fantasy and reality intertwine, where your determination and resourcefulness are your greatest assets. With your newfound friends and the Orb’s power, you can inch closer to your goal and confront the enigmatic Goblin King.
              - text: Entering the fantastical collectible pinball world of “Labyrinth”, limited to just 1,100 games worldwide, promises to be an enchanting and unique experience. Where the magic of Jim Henson’s visionary world meets the tactile and immersive thrill of pinball gameplay. Each flip of the flippers, bump of the ball, will transport you into the heart of the Labyrinth.
              - text: Immerse yourself in the iconic scenes and Music from the movie, reliving key moments and challenges from the film. Complete with interactive features and toys that will transport you to the world of Labyrinth while appreciating the craftsmanship and attention to detail that went into creating this limited collectible.
              - text: So, for those lucky enough to acquire one of these 1,100 units, may your adventure through the “Labyrinth” pinball world be a one-of-a-kind experience, filled with the same wonder and excitement that the movie brought to fans for decades.
