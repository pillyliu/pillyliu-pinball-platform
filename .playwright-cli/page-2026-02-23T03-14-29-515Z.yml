          - generic [ref=e123]:
            - heading "Spooky Pinball" [level=2] [ref=e124]
            - heading "Texas Chainsaw Massacre (Blood Sucker Edition)" [level=1] [ref=e125]
            - generic [ref=e126]: The Texas Chainsaw Massacre is a standard body pinball machine where YOU will be taking on the role of the Slaughter family, going about the gruesome tasks of catching, killing, and cooking your victims. Based on and featuring the entirety of the 1974 all time Classic film on its 50th anniversary. You’ll be guided along by the powerful narrative voice of Scott Innes, and given rather gruesome support by the original Hitchhiker actor himself, Edwin Neal. The world of madness would not be complete without a haunting soundtrack. Matt Montgomery brings his most unnerving and disturbed soundtrack yet, which will undoubtedly have you checking around the room while you play! Back Alley Creations returns as well to bring the grimey world into existence with his custom sculpts. And to bring the ultimate feeling of true madness, is the return of Benjamin Heckendorn on the game code, with story and rules directed by Corwin “Bug” Emery, and Hilton Jones. The Texas Chainsaw Massacre is the 3rd game designed by Spooky Luke and Corwin “Bug” Emery, and is certainly their best shooter yet. The game features a variety of major mechs, some of which being an interactive Leatherface Kill Door Bash Toy, and a Meat Grinding Ball Lock Mechanism.
