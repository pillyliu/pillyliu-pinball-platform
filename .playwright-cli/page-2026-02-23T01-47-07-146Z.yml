          - generic [ref=e123]:
            - heading "American Pinball" [level=2] [ref=e124]
            - heading "Oktoberfest" [level=1] [ref=e125]
            - generic [ref=e126]:
              - text: “Experience the world famous Oktoberfest, year round, with Pinball on Tap! Travel around the festival, visiting over a dozen tents and collecting steins for each. Relish in the thrill of the exciting rides, including the amazing Corkscrew roller coaster! Enjoy fantastic music, food, and drink to round out the ultimate Oktoberfest adventure.”
              - text: The new Oktoberfest game will allow players to experience the world famous Oktoberfest, year round, with Pinball on Tap! Players travel around the festival, visiting over a dozen tents and collecting steins for each while enjoying fantastic music, food, and drink, to round out the ultimate Oktoberfest adventure.
              - text: Unique gameplay features include multiple wireform ramps and the awesome Corkscrew Rollercoaster with twin loops and a zig zag, Shack &amp;amp;amp;amp;amp;amp;amp;amp; Beer Barrel with 3-ball lock mechanisms, and Otto the Bartender, an interactive target and ball lock assembly.
              - text: Players will advance through gameplay with the help of three flippers, three bumper car pop bumpers, three slingshots, a ramp that raises and lowers, and four magnets, two of which are player-controlled with a MagNab cabinet button.
              - text: Rule features include 5 multiballs, including the Beer Barrel Multiball and Corkscrew Multiball, 14 tent modes, including a video mode and a mini-wizard mode, beer stein power ups to assist players towards objectives and increase scoring, a food stand scoring accelerator with two special modes, three mini-wizard modes, and an Uber-Wizard mode. Plus, lots of ducks!
              - text: Complementing the exciting gameplay experience and immersive theme, cabinet features include real backglass, custom music, a 15" full color LCD with 1366x768 resolution, 6 powerful stereo speakers, plus an 8" cabinet subwoofer.
              - text: Oktoberfest pinball machines will be available through authorized American Pinball distributors and dealers around the world. Stay tuned for more information on pricing and availability.
